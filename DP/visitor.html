<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitor Pattern</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-2xl p-8 max-w-xl w-full">
    
    <h1 class="text-3xl font-bold text-purple-600 mb-4">
      Visitor Pattern
    </h1>

    <p class="text-gray-700 text-lg mb-6">
      Separates algorithms from object structures.
    </p>

    <div class="bg-purple-50 border border-purple-200 rounded-xl p-4 mb-6">
      <h2 class="text-xl font-semibold text-purple-700 mb-2">
        Purpose
      </h2>

      <p class="text-gray-700">
        The Visitor pattern allows adding new operations to existing objects
        without modifying their structure.
      </p>
    </div>

    <div>
      <h2 class="text-xl font-semibold text-gray-800 mb-3">
        Common Uses
      </h2>

      <ul class="list-disc list-inside text-gray-700 space-y-2">
        <li>Compilers and interpreters</li>
        <li>Document processing systems</li>
        <li>Syntax tree operations</li>
        <li>Reporting tools</li>
      </ul>
    </div>

  </div>

</body>
</html>
