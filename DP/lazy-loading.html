<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
    
    <div class="bg-white p-6 rounded-lg shadow-md max-w-md">
        <h1 class="text-2xl font-bold text-blue-600 mb-4">
            Lazy Loading
        </h1>

        <p class="text-gray-700 mb-4">
            Lazy Loading is a design pattern that loads data or objects
            only when they are needed.
        </p>

        <h2 class="font-semibold mb-2">Benefits</h2>
        <ul class="list-disc pl-5 text-gray-700">
            <li>Faster startup time</li>
            <li>Reduced memory usage</li>
            <li>Better performance</li>
        </ul>

        <div class="mt-4 p-3 bg-blue-50 rounded">
            <strong>Example:</strong> Load a user's profile details only
            when the user opens the profile page.
        </div>
    </div>

</body>
</html>
