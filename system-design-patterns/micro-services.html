```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microservices Architecture</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- NAVBAR -->
  <nav class="bg-purple-600 text-white p-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between">
      <h1 class="font-bold text-lg">System Design</h1>
      <div class="space-x-4">
        <a href="#" class="hover:underline">Client-Server</a>
        <a href="#" class="hover:underline">P2P</a>
        <a href="#" class="underline font-semibold">Microservices</a>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto p-6">

    <h2 class="text-3xl font-bold text-purple-600 mb-4">
      Microservices Architecture Flow
    </h2>

    <!-- DIAGRAM -->
    <div class="bg-white p-6 rounded-xl shadow-md overflow-x-auto">
      <svg viewBox="0 0 900 200" class="w-full">

        <!-- BOXES -->
        <g id="step1" class="opacity-30">
          <rect x="10" y="60" width="120" height="60" rx="10" class="fill-purple-200"/>
          <text x="70" y="95" text-anchor="middle">Client</text>
        </g>

        <g id="step2" class="opacity-30">
          <rect x="150" y="60" width="120" height="60" rx="10" class="fill-purple-200"/>
          <text x="210" y="95" text-anchor="middle">API Gateway</text>
        </g>

        <g id="step3" class="opacity-30">
          <rect x="290" y="60" width="140" height="60" rx="10" class="fill-purple-200"/>
          <text x="360" y="95" text-anchor="middle">Service</text>
        </g>

        <g id="step4" class="opacity-30">
          <rect x="450" y="60" width="140" height="60" rx="10" class="fill-purple-200"/>
          <text x="520" y="95" text-anchor="middle">Dependencies</text>
        </g>

        <g id="step5" class="opacity-30">
          <rect x="610" y="60" width="140" height="60" rx="10" class="fill-purple-200"/>
          <text x="680" y="95" text-anchor="middle">Events</text>
        </g>

        <g id="step6" class="opacity-30">
          <rect x="770" y="60" width="120" height="60" rx="10" class="fill-purple-200"/>
          <text x="830" y="95" text-anchor="middle">Response</text>
        </g>

        <!-- ARROWS -->
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
            <path d="M0,0 L10,5 L0,10 Z" fill="black" />
          </marker>
        </defs>

        <line x1="130" y1="90" x2="150" y2="90" stroke="black" marker-end="url(#arrow)" />
        <line x1="270" y1="90" x2="290" y2="90" stroke="black" marker-end="url(#arrow)" />
        <line x1="430" y1="90" x2="450" y2="90" stroke="black" marker-end="url(#arrow)" />
        <line x1="590" y1="90" x2="610" y2="90" stroke="black" marker-end="url(#arrow)" />
        <line x1="750" y1="90" x2="770" y2="90" stroke="black" marker-end="url(#arrow)" />

      </svg>
    </div>

    <!-- BUTTONS -->
    <div class="mt-6 flex gap-4">
      <button onclick="startForward()" 
        class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700">
        ▶ Forward Flow
      </button>

      <button onclick="startReverse()" 
        class="bg-gray-700 text-white px-6 py-2 rounded-lg hover:bg-gray-800">
        🔄 Reverse Flow
      </button>
    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    const forward = ["step1","step2","step3","step4","step5","step6"];
    const reverse = [...forward].reverse();

    function reset() {
      forward.forEach(id => {
        document.getElementById(id).style.opacity = "0.3";
      });
    }

    function highlight(step) {
      document.getElementById(step).style.opacity = "1";
    }

    async function startForward() {
      reset();
      for (let i = 0; i < forward.length; i++) {
        highlight(forward[i]);
        await new Promise(r => setTimeout(r, 700));
      }
    }

    async function startReverse() {
      reset();
      for (let i = 0; i < reverse.length; i++) {
        highlight(reverse[i]);
        await new Promise(r => setTimeout(r, 700));
      }
    }

    // Auto run forward on load
    window.onload = startForward;
  </script>

</body>
</html>
```
