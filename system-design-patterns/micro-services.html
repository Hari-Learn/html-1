<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Microservices Architecture</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

  <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-2xl p-6">
    <h1 class="text-3xl font-bold mb-4 text-purple-600">Microservices Architecture</h1>

    <p class="mb-6 text-gray-700">
      An approach where applications are built as small, independent services.
    </p>

    <div class="space-y-4">
      <div class="p-4 bg-purple-50 rounded-lg">1️⃣ Receive request</div>
      <div class="p-4 bg-purple-50 rounded-lg">2️⃣ API Gateway routes request</div>
      <div class="p-4 bg-purple-50 rounded-lg">3️⃣ Service handles feature</div>
      <div class="p-4 bg-purple-50 rounded-lg">4️⃣ Call dependencies</div>
      <div class="p-4 bg-purple-50 rounded-lg">5️⃣ Publish events</div>
      <div class="p-4 bg-purple-50 rounded-lg">6️⃣ Return response</div>
    </div>

  </div>

</body>
</html>
