<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client-Server Architecture</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

  <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-2xl p-6">
    <h1 class="text-3xl font-bold mb-4 text-blue-600">Client-Server Architecture</h1>

    <p class="mb-6 text-gray-700">
      A model where clients request services and servers respond with data or processing.
    </p>

    <div class="space-y-4">
      <div class="p-4 bg-blue-50 rounded-lg">1️⃣ Client sends request</div>
      <div class="p-4 bg-blue-50 rounded-lg">2️⃣ Load balancer routes request</div>
      <div class="p-4 bg-blue-50 rounded-lg">3️⃣ Server processes logic</div>
      <div class="p-4 bg-blue-50 rounded-lg">4️⃣ Query data store</div>
      <div class="p-4 bg-blue-50 rounded-lg">5️⃣ Build response</div>
      <div class="p-4 bg-blue-50 rounded-lg">6️⃣ Client renders UI</div>
    </div>

  </div>

</body>
</html>
