<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Peer-to-Peer Architecture</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

  <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-2xl p-6">
    <h1 class="text-3xl font-bold mb-4 text-green-600">Peer-to-Peer Architecture</h1>

    <p class="mb-6 text-gray-700">
      A decentralized network where nodes communicate directly without a central server.
    </p>

    <div class="space-y-4">
      <div class="p-4 bg-green-50 rounded-lg">1️⃣ Discover peers</div>
      <div class="p-4 bg-green-50 rounded-lg">2️⃣ Establish connection</div>
      <div class="p-4 bg-green-50 rounded-lg">3️⃣ Partition resources</div>
      <div class="p-4 bg-green-50 rounded-lg">4️⃣ Exchange messages</div>
      <div class="p-4 bg-green-50 rounded-lg">5️⃣ Sync updates</div>
      <div class="p-4 bg-green-50 rounded-lg">6️⃣ Handle failures</div>
    </div>

  </div>

</body>
</html>
