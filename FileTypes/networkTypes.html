<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network File Systems (ELI10)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-purple-50 font-sans">

<div class="max-w-5xl mx-auto p-8">

  <h1 class="text-4xl font-bold text-purple-700 text-center mb-10">
    Network File Systems 🌐 (ELI10)
  </h1>

  <div class="grid md:grid-cols-2 gap-6">

    <!-- NFS -->
    <div class="bg-white p-6 rounded-2xl shadow border-t-4 border-purple-500">
      <h2 class="text-xl font-bold mb-2">NFS</h2>
      <p class="text-gray-600">
        Like sharing a folder with friends on Linux 🐧.  
        You can access files from another computer as if they are on your own.
      </p>
    </div>

    <!-- SMB -->
    <div class="bg-white p-6 rounded-2xl shadow border-t-4 border-blue-500">
      <h2 class="text-xl font-bold mb-2">SMB</h2>
      <p class="text-gray-600">
        Windows-style file sharing 🪟.  
        Lets computers share files over a network easily.
      </p>
    </div>

  </div>

  <footer class="text-center mt-10 text-gray-500 text-sm">
    Network File Systems • ELI10 Guide
  </footer>

</div>

</body>
</html>
