<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CAPWAP Ports</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-xl rounded-2xl p-10 max-w-xl w-full text-center">
    
    <h1 class="text-3xl font-bold text-blue-700 mb-4">
      CAPWAP Uses UDP
    </h1>

    <p class="text-gray-600 mb-8">
      CAPWAP (Control And Provisioning of Wireless Access Points) communicates using UDP protocol on the following ports:
    </p>

    <div class="space-y-4">
      <div class="bg-blue-100 rounded-lg p-4">
        <h2 class="text-xl font-semibold text-blue-800">
          Port 5246 → Control
        </h2>
      </div>

      <div class="bg-green-100 rounded-lg p-4">
        <h2 class="text-xl font-semibold text-green-800">
          Port 5247 → Data
        </h2>
      </div>
    </div>

    <div class="mt-8 text-sm text-gray-500">
      Protocol: <span class="font-semibold text-gray-700">UDP</span>
    </div>

  </div>

</body>
</html>
